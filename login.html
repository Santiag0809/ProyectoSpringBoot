<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrack · Iniciar Sesión</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login">
        <img src="src/LogiTrack.png" alt="LogiTrack">

        <p class="titulito">Bienvenido a LogiTrack</p>
        <p class="subtitulito">Por favor ingresa tus datos para ingresar a la plataforma</p>

        <form>
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="ejemplo@logitrack.com" autocomplete="off">

            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">

            <a class="boton" href="welcome.html">Ingresar al sistema</a>
            
        </form>

        <p class="error" id="error">Credenciales incorrectas. Intenta de nuevo.</p>

        <p class="subtitulito">¿Tienes problemas para ingresar? Contacta al administrador.</p>
    </div>    
</body>
</html>
